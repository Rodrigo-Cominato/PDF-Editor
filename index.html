<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor PDF</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root {
      /* Modo Claro: Terracota e Laranja mais marcantes, porém opacos/desbotados */
      --bg: #F8F3EE;           /* Fundo bege bem suave e levemente opaco */
      --surface: #FFFFFF;
      --surface2: #EFE4DC;     /* Superfície 2 levemente alaranjada/terracota clara */
      --border: #D8C3B5;       /* Borda em tom terroso suave */
      --text: #32221A;         /* Marrom muito escuro para contraste */
      --text2: #7A6255;        /* Marrom médio opaco */
      --accent: #B85B38;       /* Terracota suave/opaco */
      --accent2: #9E4A2B;      /* Terracota fechado */
      --orange: #CA7A54;       /* Laranja terroso desaturado (nada vibrante) */
      --accent-soft: #F2E3DB;  /* Fundo selecionado em terracota pastel leve */
      --shadow: 0 2px 16px rgba(50, 34, 26, 0.06);
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
    }
    [data-theme="dark"] {
      /* Modo Escuro: Marrom menos escuro, mantendo a sobriedade */
      --bg: #211814;          /* Marrom escuro (menos próximo do preto) */
      --surface: #2C211B;      /* Marrom médio suavizado */
      --surface2: #382A23;     /* Marrom intermediário */
      --border: #4D3B31;       /* Borda visível em marrom terroso */
      --text: #F3EBE5;         /* Texto claro off-white */
      --text2: #B09B8E;        /* Texto secundário em tom bege terroso */
      --accent: #D16B47;       /* Terracota opaco iluminado */
      --accent2: #B85B38;      /* Terracota base */
      --orange: #E08963;       /* Laranja opaco para elementos de destaque */
      --accent-soft: #422F26;  /* Destaque suave no modo escuro */
      --shadow: 0 2px 16px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }
    /* ─── HEADER ─── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.35rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      font-weight: 900;
      font-size: 0.9rem;
      letter-spacing: -1px;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .btn-icon {
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: all var(--transition);
    }
    .btn-icon:hover { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
    .lang-btn {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all var(--transition);
    }
    .lang-btn:hover { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
    /* ─── MAIN ─── */
    main { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    /* ─── HERO ─── */
    .hero { text-align: center; margin-bottom: 48px; }
    .hero h1 { font-size: 2.4rem; font-weight: 800; color: var(--text); margin-bottom: 12px; }
    .hero h1 span { color: var(--accent); }
    .hero p { font-size: 1.1rem; color: var(--text2); max-width: 560px; margin: 0 auto; }
    /* ─── TOOLS GRID ─── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }
    .tool-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .tool-card::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .tool-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(184,91,56,0.18); }
    .tool-card:hover::before { opacity: 0.04; }
    .tool-card.active { border-color: var(--accent); background: var(--accent-soft); }
    .tool-icon { font-size: 2.2rem; margin-bottom: 12px; display: block; }
    .tool-name { font-weight: 700; font-size: 0.95rem; color: var(--text); margin-bottom: 4px; }
    .tool-desc { font-size: 0.78rem; color: var(--text2); line-height: 1.4; }
    /* ─── WORKSPACE ─── */
    .workspace { display: none; }
    .workspace.visible { display: block; }
    .workspace-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px;
    }
    .back-btn {
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .back-btn:hover { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
    .workspace-title { font-size: 1.5rem; font-weight: 800; }
    .workspace-subtitle { font-size: 0.9rem; color: var(--text2); margin-top: 2px; }
    /* ─── DROP ZONE ─── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      margin-bottom: 24px;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
    }
    .drop-icon { font-size: 3rem; margin-bottom: 16px; color: var(--accent); }
    .drop-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .drop-sub { font-size: 0.9rem; color: var(--text2); }
    /* ─── FILE LIST ─── */
    .file-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .file-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: box-shadow var(--transition);
    }
    .file-item:hover { box-shadow: var(--shadow); }
    .file-item-icon { font-size: 1.6rem; flex-shrink: 0; }
    .file-item-info { flex: 1; min-width: 0; }
    .file-item-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-item-size { font-size: 0.78rem; color: var(--text2); }
    .file-item-remove {
      background: none; border: none; color: var(--text2);
      cursor: pointer; font-size: 1.1rem; padding: 4px; border-radius: 4px;
      transition: all var(--transition);
    }
    .file-item-remove:hover { color: var(--accent); background: var(--accent-soft); }
    /* ─── BUTTONS ─── */
    .btn {
      padding: 13px 28px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: #FFFFFF;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(184,91,56,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }
    /* ─── PAGES PREVIEW ─── */
    .pages-container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      min-height: 80px;
    }
    .page-thumb {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      width: 120px;
      text-align: center;
      cursor: grab;
      transition: all var(--transition);
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .page-thumb:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(184,91,56,0.18); }
    .page-thumb.selected { border-color: var(--accent); background: var(--accent-soft); }
    .page-thumb.sortable-ghost { opacity: 0.4; }
    .page-thumb canvas { width: 100%; height: auto; display: block; }
    .page-thumb-label {
      padding: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text2);
      background: var(--surface2);
    }
    .page-thumb-check {
      position: absolute; top: 5px; right: 5px;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      color: transparent;
      transition: all var(--transition);
      cursor: pointer;
    }
    .page-thumb.selected .page-thumb-check {
      background: var(--accent);
      border-color: var(--accent);
      color: #FFFFFF;
    }
    /* ─── OPTIONS ROW ─── */
    .options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
    }
    .opt-group { display: flex; flex-direction: column; gap: 4px; }
    .opt-label { font-size: 0.78rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .opt-input, .opt-select {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.9rem;
      min-width: 140px;
      outline: none;
      transition: border var(--transition);
    }
    .opt-input:focus, .opt-select:focus { border-color: var(--accent); }
    /* ─── PROGRESS ─── */
    .progress-wrap { display: none; margin-bottom: 20px; }
    .progress-wrap.visible { display: block; }
    .progress-bar-bg {
      height: 8px;
      border-radius: 999px;
      background: var(--surface2);
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      border-radius: 999px;
      transition: width 0.3s ease;
    }
    .progress-label { font-size: 0.85rem; color: var(--text2); }
    /* ─── TOAST ─── */
    .toast-container {
      position: fixed;
      bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 9999;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      box-shadow: var(--shadow);
      font-size: 0.9rem;
      font-weight: 600;
      display: flex; align-items: center; gap: 10px;
      animation: slideIn 0.3s ease;
      max-width: 340px;
    }
    .toast.success { border-left: 4px solid #2e7d32; }
    .toast.error { border-left: 4px solid var(--accent); }
    .toast.info { border-left: 4px solid var(--orange); }
    @keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(60px); opacity: 0; } }
    /* ─── LOADING ─── */
    .loading-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(33, 24, 20, 0.65);
      z-index: 5000;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
    }
    .loading-overlay.visible { display: flex; }
    .spinner {
      width: 52px; height: 52px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #FFFFFF; font-size: 1rem; font-weight: 600; }
    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--text2);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .tools-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .hero h1 { font-size: 1.7rem; }
      main { padding: 24px 14px; }
      .page-thumb { width: 90px; }
    }
    /* ─── RANGE HELPER ─── */
    .range-tip { font-size: 0.78rem; color: var(--text2); margin-top: 4px; }
    /* ─── SELECT ALL ROW ─── */
    .sel-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .sel-row span { font-size: 0.85rem; color: var(--text2); }
    /* ─── BADGE ─── */
    .badge {
      display: inline-flex; align-items: center;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 8px;
    }
  </style>
</head>

  <div id="workspace" class="workspace">
    <div class="workspace-header">
      <button class="back-btn" onclick="goHome()" title="Voltar">&#8592;</button>
      <div>
        <div class="workspace-title" id="ws-title"></div>
        <div class="workspace-subtitle" id="ws-sub"></div>
      </div>
    </div>
    <div id="ws-content"></div>
  </div>
</main>

<footer>
  <p style="display:flex;align-items:center;justify-content:center;gap:8px">
    <img src="rodrigo.jpg" alt="Rodrigo Cominato" style="width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid var(--border)" />
    <span data-i18n="footer_made">Feito por Rodrigo Cominato</span>
  </p>
</footer>

<!-- ─── LOADING ─── -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Processando...</div>
</div>

<!-- ─── TOASTS ─── -->
<div class="toast-container" id="toasts"></div>

function dropZoneHTML(multiple = false, accept = '.pdf') {
  const tip = multiple ? t('drop_multiple') : t('drop_title');
  return `
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="${accept}" ${multiple ? 'multiple' : ''} />
      <div class="drop-icon">📄</div>
      <div class="drop-title">${tip}</div>
      <div class="drop-sub">${t('drop_or')}</div>
    </div>`;
}

function setupDropZone(onFiles) {
  const dz = document.getElementById('drop-zone');
  const inp = document.getElementById('file-input');
  if (!dz || !inp) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf');
    if (files.length) onFiles(files);
  });
  inp.addEventListener('change', () => {
    const files = [...inp.files];
    if (files.length) onFiles(files);
    inp.value = '';
  });
}

function fmt(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || t('loading_proc');
  document.getElementById('loading').classList.add('visible');
}
function hideLoading() { document.getElementById('loading').classList.remove('visible'); }

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.animation = 'slideOut 0.3s ease forwards'; setTimeout(() => el.remove(), 300); }, 3500);
}

function download(bytes, name) {
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function readFile(file) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = e => res(new Uint8Array(e.target.result));
    fr.onerror = rej;
    fr.readAsArrayBuffer(file);
  });
}

// ─── PDF.js PAGE RENDER ───
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function renderPdfPages(fileOrBytes, containerSelector, clickable = false, onSelect = null) {
  const container = document.querySelector(containerSelector);
  if (!container) return;
  container.innerHTML = '<div style="color:var(--text2);padding:20px;" data-i18n="loading_render">' + t('loading_render') + '</div>';
  try {
    let data;
    if (fileOrBytes instanceof File) data = await readFile(fileOrBytes);
    else data = fileOrBytes;
    const pdf = await pdfjsLib.getDocument({ data }).promise;
    container.innerHTML = '';
    const selected = new Set();
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: 0.6 });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      const thumb = document.createElement('div');
      thumb.className = 'page-thumb';
      thumb.dataset.page = i;
      const checkEl = document.createElement('div');
      checkEl.className = 'page-thumb-check';
      checkEl.innerHTML = '✓';
      const label = document.createElement('div');
      label.className = 'page-thumb-label';
      label.textContent = i18n[currentLang]['pg'] ? t('pg') + ' ' + i : 'p. ' + i;
      thumb.appendChild(checkEl);
      thumb.appendChild(canvas);
      thumb.appendChild(label);
      if (clickable) {
        thumb.addEventListener('click', () => {
          thumb.classList.toggle('selected');
          if (thumb.classList.contains('selected')) selected.add(i);
          else selected.delete(i);
          if (onSelect) onSelect([...selected]);
          updateSelCount(container, selected.size);
        });
      }
      container.appendChild(thumb);
    }
    return pdf.numPages;
  } catch (e) {
    container.innerHTML = '<p style="color:var(--accent)">' + t('msg_error') + '</p>';
    console.error(e);
  }
}

function updateSelCount(container, n) {
  const counter = document.getElementById('sel-count');
  if (counter) counter.textContent = n + ' ' + t('selected_count');
}

function progressHTML() {
  return `<div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label"></div>
  </div>`;
}
function setProgress(pct, label) {
  const w = document.getElementById('progress-wrap');
  const f = document.getElementById('progress-fill');
  const l = document.getElementById('progress-label');
  if (w) w.classList.add('visible');
  if (f) f.style.width = pct + '%';
  if (l) l.textContent = label || '';
}

function merge() {
  document.getElementById('ws-sub').textContent = t('merge_tip');
  const content = document.getElementById('ws-content');
  const fileList = [];
  content.innerHTML = `
    ${dropZoneHTML(true)}
    <div class="file-list" id="merge-list" style="margin-top:16px"></div>
    ${progressHTML()}
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-primary" id="merge-btn" onclick="doMerge()" disabled>
        📎 ${t('btn_process')}
      </button>
    </div>`;

  setupDropZone(files => {
    files.forEach(f => fileList.push(f));
    renderMergeList();
  });

  window._mergeFiles = fileList;

  function renderMergeList() {
    const list = document.getElementById('merge-list');
    list.innerHTML = fileList.map((f, i) => `
      <div class="file-item" draggable="true" data-idx="${i}">
        <span class="file-item-icon">📄</span>
        <div class="file-item-info">
          <div class="file-item-name">${f.name}</div>
          <div class="file-item-size">${fmt(f.size)}</div>
        </div>
        <button class="file-item-remove" onclick="mergeRemove(${i})">✕</button>
      </div>`).join('');
    document.getElementById('merge-btn').disabled = fileList.length < 2;
    // drag-to-reorder file list
    if (fileList.length > 1) {
      new Sortable(list, {
        animation: 150,
        onEnd(evt) {
          const moved = fileList.splice(evt.oldIndex, 1)[0];
          fileList.splice(evt.newIndex, 0, moved);
          window._mergeFiles = fileList;
        }
      });
    }
  }

  window.mergeRemove = (i) => { fileList.splice(i, 1); renderMergeList(); };
}

async function doMerge() {
  const files = window._mergeFiles;
  if (!files || files.length < 2) { toast(t('msg_select_2files'), 'error'); return; }
  showLoading(t('loading_proc'));
  try {
    const merged = await PDFDocument.create();
    for (let i = 0; i < files.length; i++) {
      setProgress(Math.round((i / files.length) * 90), files[i].name);
      const bytes = await readFile(files[i]);
      const pdf = await PDFDocument.load(bytes);
      const pages = await merged.copyPages(pdf, pdf.getPageIndices());
      pages.forEach(p => merged.addPage(p));
    }
    setProgress(100, t('msg_done'));
    const out = await merged.save();
    download(out, 'rodrigopdf_merged.pdf');
    toast(t('msg_done'), 'success');
  } catch(e) { toast(t('msg_error'), 'error'); console.error(e); }
  finally { hideLoading(); }
}

    <button class="btn btn-primary" id="split-btn" onclick="doSplit()" disabled>✂️ ${t('btn_process')}</button>`;

  setupDropZone(files => {

    window._splitFile = splitFile;
    document.getElementById('split-file-info').innerHTML = `
      <div class="file-item">

        </div>
      </div>`;
    document.getElementById('split-opts').style.display = '';
    document.getElementById('split-btn').disabled = false;
  });

  window.toggleSplitMode = () => {
    const mode = document.getElementById('split-mode').value;
    document.getElementById('range-group').style.display = mode === 'range' ? '' : 'none';
  };
}

function parseRanges(str, total) {
  const parts = str.split(',').map(s => s.trim()).filter(Boolean);
  const pages = [];
  for (const p of parts) {
    if (p.includes('-')) {
      const [a, b] = p.split('-').map(Number);
      if (isNaN(a) || isNaN(b) || a < 1 || b > total || a > b) return null;
      for (let i = a; i <= b; i++) pages.push(i - 1);
    } else {
      const n = Number(p);
      if (isNaN(n) || n < 1 || n > total) return null;
      pages.push(n - 1);
    }
  }
  return pages;
}

async function doSplit() {
  const file = window._splitFile;
  if (!file) { toast(t('msg_select_file'), 'error'); return; }
  const mode = document.getElementById('split-mode').value;
  showLoading(t('loading_proc'));
  try {
    const bytes = await readFile(file);
    const src = await PDFDocument.load(bytes);
    const total = src.getPageCount();
    if (mode === 'all') {
      for (let i = 0; i < total; i++) {
        setProgress(Math.round((i / total) * 100), `${i+1}/${total}`);
        const doc = await PDFDocument.create();
        const [pg] = await doc.copyPages(src, [i]);
        doc.addPage(pg);
        const out = await doc.save();
        download(out, `rodrigopdf_page${i+1}.pdf`);
        await new Promise(r => setTimeout(r, 120));
      }
    } else {
      const rangeStr = document.getElementById('split-ranges').value;
      const indices = parseRanges(rangeStr, total);
      if (!indices || !indices.length) { hideLoading(); toast(t('msg_invalid_range'), 'error'); return; }
      const doc = await PDFDocument.create();
      const pages = await doc.copyPages(src, indices);
      pages.forEach(p => doc.addPage(p));
      const out = await doc.save();
      download(out, 'rodrigopdf_split.pdf');
    }
    setProgress(100);
    toast(t('msg_done'), 'success');
  } catch(e) { toast(t('msg_error'), 'error'); console.error(e); }
  finally { hideLoading(); }
}

    </div>

  setupDropZone(async files => {

async function doRotate() {
  const file = window._rotateFile;
  if (!file) { toast(t('msg_select_file'), 'error'); return; }
  const sel = window.rotateSel;
  if (!sel.size) { toast(t('msg_select_pages'), 'error'); return; }
  const angle = Number(document.getElementById('rotate-angle').value);
  showLoading(t('loading_proc'));
  try {
    const bytes = await readFile(file);
    const pdf = await PDFDocument.load(bytes);
    pdf.getPages().forEach((pg, i) => {
      if (sel.has(i + 1)) {
        const cur = pg.getRotation().angle;
        pg.setRotation(degrees((cur + angle) % 360));
      }
    });
    const out = await pdf.save();
    download(out, 'rodrigopdf_rotated.pdf');
    toast(t('msg_done'), 'success');
  } catch(e) { toast(t('msg_error'), 'error'); console.error(e); }
  finally { hideLoading(); }
}

async function doRemove() {
  const file = window._removeFile;
  if (!file) { toast(t('msg_select_file'), 'error'); return; }
  const sel = window.removeSel;
  if (!sel.size) { toast(t('msg_select_pages'), 'error'); return; }
  showLoading(t('loading_proc'));
  try {
    const bytes = await readFile(file);
    const src = await PDFDocument.load(bytes);
    const total = src.getPageCount();
    const keep = [];
    for (let i = 0; i < total; i++) if (!sel.has(i + 1)) keep.push(i);
    if (!keep.length) { hideLoading(); toast(t('msg_select_pages'), 'error'); return; }
    const doc = await PDFDocument.create();
    const pages = await doc.copyPages(src, keep);
    pages.forEach(p => doc.addPage(p));
    const out = await doc.save();
    download(out, 'rodrigopdf_removed.pdf');
    toast(t('msg_done'), 'success');
  } catch(e) { toast(t('msg_error'), 'error'); console.error(e); }
  finally { hideLoading(); }
}

// ════════════════════════════════════════
//  TOOL: EXTRACT
// ════════════════════════════════════════
function extract() {
  document.getElementById('ws-sub').textContent = t('extract_tip');
  const content = document.getElementById('ws-content');
  content.innerHTML = `
    ${dropZoneHTML(false)}
    <div id="extract-pages" class="pages-container"></div>
    <div class="sel-row">
      <span id="sel-count">0 ${t('selected_count')}</span>
      <button class="btn btn-secondary" onclick="selAll('#extract-pages', extractSel)" style="font-size:0.82rem;padding:7px 14px">${t('btn_select_all')}</button>
      <button class="btn btn-secondary" onclick="deselAll('#extract-pages', extractSel)" style="font-size:0.82rem;padding:7px 14px">${t('btn_deselect')}</button>
    </div>
    ${progressHTML()}
    <button class="btn btn-primary" id="extract-btn" onclick="doExtract()" disabled>📤 ${t('btn_process')}</button>`;

  const sel = new Set();
  window.extractSel = sel;

  setupDropZone(async files => {
    window._extractFile = files[0];
    sel.clear();
    document.getElementById('extract-btn').disabled = false;
    await renderPdfPages(files[0], '#extract-pages', true, pages => {
      sel.clear(); pages.forEach(p => sel.add(p));
    });
  });

  if (!window.selAll) {
    window.selAll = (s, setObj) => {
      document.querySelectorAll(s + ' .page-thumb').forEach(el => { el.classList.add('selected'); setObj.add(Number(el.dataset.page)); });
      updateSelCount(null, setObj.size);
    };
    window.deselAll = (s, setObj) => {
      document.querySelectorAll(s + ' .page-thumb').forEach(el => el.classList.remove('selected'));
      setObj.clear(); updateSelCount(null, 0);
    };
  }
}

async function doExtract() {
  const file = window._extractFile;
  if (!file) { toast(t('msg_select_file'), 'error'); return; }
  const sel = window.extractSel;
  if (!sel.size) { toast(t('msg_select_pages'), 'error'); return; }
  showLoading(t('loading_proc'));
  try {
    const bytes = await readFile(file);
    const src = await PDFDocument.load(bytes);
    const indices = [...sel].sort((a,b) => a-b).map(p => p - 1);
    const doc = await PDFDocument.create();
    const pages = await doc.copyPages(src, indices);
    pages.forEach(p => doc.addPage(p));
    const out = await doc.save();
    download(out, 'rodrigopdf_extracted.pdf');
    toast(t('msg_done'), 'success');
  } catch(e) { toast(t('msg_error'), 'error'); console.error(e); }
  finally { hideLoading(); }
}

// ════════════════════════════════════════
//  TOOL: PAGE NUMBERS
// ════════════════════════════════════════
function numbering() {
  document.getElementById('ws-sub').textContent = t('t_number_sub');
  const content = document.getElementById('ws-content');
  content.innerHTML = `
    ${dropZoneHTML(false)}
    <div id="number-file-info" style="margin:12px 0"></div>
    <div class="options-row" id="number-opts" style="display:none">
      <div class="opt-group">
        <div class="opt-label">${t('num_pos')}</div>
        <select class="opt-select" id="num-pos">
          <option value="bottom-center">${t('num_bottom_center')}</option>
          <option value="bottom-right">${t('num_bottom_right')}</option>
          <option value="bottom-left">${t('num_bottom_left')}</option>
          <option value="top-center">${t('num_top_center')}</option>
          <option value="top-right">${t('num_top_right')}</option>
        </select>
      </div>
      <div class="opt-group">
        <div class="opt-label">${t('num_start')}</div>
        <input class="opt-input" id="num-start" type="number" value="1" min="1" style="width:90px" />
      </div>
      <div class="opt-group">
        <div class="opt-label">${t('num_font_size')}</div>
        <input class="opt-input" id="num-size" type="number" value="12" min="6" max="48" style="width:90px" />
      </div>
    </div>
    ${progressHTML()}
    <button class="btn btn-primary" id="number-btn" onclick="doNumber()" disabled>🔢 ${t('btn_process')}</button>`;

  setupDropZone(files => {
    window._numberFile = files[0];
    document.getElementById('number-btn').disabled = false;
    document.getElementById('number-opts').style.display = '';
    document.getElementById('number-file-info').innerHTML = `
      <div class="file-item">
        <span class="file-item-icon">📄</span>
        <div class="file-item-info">
          <div class="file-item-name">${files[0].name}</div>
          <div class="file-item-size">${fmt(files[0].size)}</div>
        </div>
      </div>`;
  });
}

async function doNumber() {
  const file = window._numberFile;
  if (!file) { toast(t('msg_select_file'), 'error'); return; }
  showLoading(t('loading_proc'));
  try {
    const bytes = await readFile(file);
    const pdf = await PDFDocument.load(bytes);
    const font = await pdf.embedFont(StandardFonts.Helvetica);
    const pos = document.getElementById('num-pos').value;
    const startAt = parseInt(document.getElementById('num-start').value) || 1;
    const fontSize = parseInt(document.getElementById('num-size').value) || 12;
    const pages = pdf.getPages();
    pages.forEach((page, i) => {
      const { width, height } = page.getSize();
      const label = String(startAt + i);
      const textWidth = font.widthOfTextAtSize(label, fontSize);
      let x, y;
      const margin = 20;
      if (pos === 'bottom-center') { x = (width - textWidth) / 2; y = margin; }
      else if (pos === 'bottom-right') { x = width - textWidth - margin; y = margin; }
      else if (pos === 'bottom-left') { x = margin; y = margin; }
      else if (pos === 'top-center') { x = (width - textWidth) / 2; y = height - margin - fontSize; }
      else { x = width - textWidth - margin; y = height - margin - fontSize; }
      page.drawText(label, { x, y, size: fontSize, font, color: rgb(0.1, 0.1, 0.1) });
    });
    const out = await pdf.save();
    download(out, 'rodrigopdf_numbered.pdf');
    toast(t('msg_done'), 'success');
  } catch(e) { toast(t('msg_error'), 'error'); console.error(e); }
  finally { hideLoading(); }
}

// ════════════════════════════════════════
//  TOOL: WATERMARK
// ════════════════════════════════════════
function watermark() {
  document.getElementById('ws-sub').textContent = t('t_watermark_sub');
  const content = document.getElementById('ws-content');
  content.innerHTML = `
    ${dropZoneHTML(false)}
    <div id="wm-file-info" style="margin:12px 0"></div>
    <div class="options-row" id="wm-opts" style="display:none">
      <div class="opt-group" style="flex:1;min-width:200px">
        <div class="opt-label">${t('wm_text')}</div>
        <input class="opt-input" id="wm-text" type="text" placeholder="Editor PDF" style="width:100%" />
      </div>
      <div class="opt-group">
        <div class="opt-label">${t('wm_size')}</div>
        <input class="opt-input" id="wm-size" type="number" value="48" min="10" max="120" style="width:90px" />
      </div>
      <div class="opt-group">
        <div class="opt-label">${t('wm_opacity')}</div>
        <input class="opt-input" id="wm-opacity" type="number" value="20" min="1" max="100" style="width:90px" />
      </div>
      <div class="opt-group">
        <div class="opt-label">${t('wm_rotation')}</div>
        <input class="opt-input" id="wm-rotation" type="number" value="45" min="-180" max="180" style="width:90px" />
      </div>
    </div>
    ${progressHTML()}
    <button class="btn btn-primary" id="wm-btn" onclick="doWatermark()" disabled>💧 ${t('btn_process')}</button>`;

  setupDropZone(files => {
    window._wmFile = files[0];
    document.getElementById('wm-btn').disabled = false;
    document.getElementById('wm-opts').style.display = '';
    document.getElementById('wm-file-info').innerHTML = `
      <div class="file-item">
        <span class="file-item-icon">📄</span>
        <div class="file-item-info">
          <div class="file-item-name">${files[0].name}</div>
          <div class="file-item-size">${fmt(files[0].size)}</div>
        </div>
      </div>`;
  });
}

async function doWatermark() {
  const file = window._wmFile;
  if (!file) { toast(t('msg_select_file'), 'error'); return; }
  const text = document.getElementById('wm-text').value.trim();
  if (!text) { toast(t('msg_wm_empty'), 'error'); return; }
  showLoading(t('loading_proc'));
  try {
    const bytes = await readFile(file);
    const pdf = await PDFDocument.load(bytes);
    const font = await pdf.embedFont(StandardFonts.HelveticaBold);
    const opacity = Math.min(100, Math.max(1, parseInt(document.getElementById('wm-opacity').value) || 20)) / 100;
    const fontSize = parseInt(document.getElementById('wm-size').value) || 48;
    const rotDeg = parseInt(document.getElementById('wm-rotation').value) || 45;
    const grayVal = 0.5;
    pdf.getPages().forEach(page => {
      const { width, height } = page.getSize();
      const textWidth = font.widthOfTextAtSize(text, fontSize);
      page.drawText(text, {
        x: (width - textWidth) / 2,
        y: (height - fontSize) / 2,
        size: fontSize,
        font,
        color: grayscale(grayVal),
        opacity,
        rotate: degrees(rotDeg),
      });
    });
    const out = await pdf.save();
    download(out, 'rodrigopdf_watermarked.pdf');
    toast(t('msg_done'), 'success');
  } catch(e) { toast(t('msg_error'), 'error'); console.error(e); }
  finally { hideLoading(); }
}
